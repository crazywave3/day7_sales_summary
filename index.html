let undoStack = [];

function getKey(p){return p.code||p.name;}
function getDayTotal(date){return Object.values(dailyData[date]||{}).reduce((s,v)=>s+v,0);}
function getProductTotal(p,yf){
  const key=getKey(p);
  return Object.keys(dailyData).filter(d=>yf?d.startsWith(yf):true).reduce((s,d)=>s+(dailyData[d][key]||0),0);
}
function getProductMonthTotal(p,ym){
  const key=getKey(p);
  return Object.keys(dailyData).filter(d=>d.startsWith(ym)).reduce((s,d)=>s+(dailyData[d][key]||0),0);
}
function getMonths(year){
  const s=new Set();
  Object.keys(dailyData).filter(d=>year?d.startsWith(year):true).forEach(d=>s.add(d.slice(0,7)));
  return [...s].sort();
}
function getYears(){const s=new Set();Object.keys(dailyData).forEach(d=>s.add(d.slice(0,4)));return [...s].sort();}
function getLatestDate(){const dates=Object.keys(dailyData).filter(d=>getDayTotal(d)>0).sort();return dates[dates.length-1]||'';}
function getLatestYear(){return getLatestDate().slice(0,4)||'2026';}
function getLatestMonth(){const ld=getLatestDate();return ld?ld.slice(0,7):'';}
function fmtDate(d){return d.replace(/^20(\d\d)-(\d\d)-(\d\d)$/,'$1$2$3');}

function refreshAll(){
  initSummary();initMonthBtns();initChartRangeBtns();initChartPeriodSelect();
  renderDaily();renderMonthly();renderYearly();renderChart();
}

function syncScroll(wrapId,topId,innerId){
  const wrap=document.getElementById(wrapId);
  const top=document.getElementById(topId);
  const inner=document.getElementById(innerId);
  if(!wrap||!top||!inner) return;
  const update=()=>{inner.style.width=wrap.scrollWidth+'px';};
  update();
  new ResizeObserver(update).observe(wrap);
  let lock=false;
  top.addEventListener('scroll',()=>{if(lock)return;lock=true;wrap.scrollLeft=top.scrollLeft;lock=false;});
  wrap.addEventListener('scroll',()=>{if(lock)return;lock=true;top.scrollLeft=wrap.scrollLeft;lock=false;});
}

let chartRange='top60days';
function getTop60DaysTotal(p){
  const allDates=Object.keys(dailyData).sort().reverse();
  const recent=allDates.slice(0,60);
  const key=getKey(p);
  return recent.reduce((s,d)=>s+(dailyData[d][key]||0),0);
}
function setChartRange(r,btn){
  chartRange=r;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}
function initChartRangeBtns(){
  const activeYears=getYears();
  const currentYear=getLatestYear();
  const pastYears=activeYears.filter(y=>y!==currentYear);
  const currentMonths=getMonths(currentYear).slice().reverse();

  let btns=[{r:'top60days',label:'žĶúÍ∑ľ 60žĚľ TOP20'}];
  // ŪėĄžě¨ žóįŽŹĄ ŽąĄÍ≥Ą
  btns.push({r:'year_'+currentYear, label:currentYear+'ŽÖĄ'});
  // ŪėĄžě¨ žóįŽŹĄ žõĒŽ≥Ą (žĶúžč† žõĒ Ž®ľž†Ä)
  currentMonths.forEach(ym=>{
    const m=ym.split('-')[1];
    btns.push({r:'month_'+ym, label:m+'žõĒ'});
  });
  // Í≥ľÍĪį žóįŽŹĄ Ž≤ĄŪäľ (ŽÖĄŽŹĄŽßĆ ŪĎúžčú)
  pastYears.sort().reverse().forEach(y=>{
    btns.push({r:'year_'+y, label:y+'ŽÖĄ'});
  });

  const container=document.getElementById('chart-range-btns');
  container.innerHTML=btns.map(b=>`<button class="toggle-btn${chartRange===b.r?' active':''}" onclick="setChartRange('${b.r}',this)">${b.label}</button>`).join('');
}
function initChartPeriodSelect(){
  // ŽąĄÍ≥Ą ŽďúŽ°≠Žč§žöī: 2026~2030
  const sel=document.getElementById('chart-period');
  const cur=sel.value;
  sel.innerHTML='';
  YEARS.forEach(y=>{sel.innerHTML+=`<option value="cumul_${y}">${y}ŽÖĄ ŽąĄÍ≥Ą</option>`;});
  // ŪėĄžě¨ chartRangeÍįÄ cumulžĚīŽ©ī žú†žßÄ, žēĄŽčąŽ©ī žĄ†ŪÉĚ žēą Ūē®
  if(cur&&cur.startsWith('cumul_')) sel.value=cur;
  sel.onchange=()=>{
    chartRange=sel.value;
    // Ž≤ĄŪäľ active Ūēīž†ú
    document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
    renderChart();
  };
}
function renderChart(){
  // chartRangežóź ŽĒįŽĚľ ŽćįžĚīŪĄį Í≤įž†ē
  let getVal, topN=null, title='';
  if(chartRange==='top60days'){
    getVal=p=>getTop60DaysTotal(p);
    topN=20;
  } else if(chartRange.startsWith('year_')){
    const y=chartRange.slice(5);
    getVal=p=>getProductTotal(p,y);
  } else if(chartRange.startsWith('month_')){
    const ym=chartRange.slice(6);
    getVal=p=>getProductMonthTotal(p,ym);
  } else if(chartRange.startsWith('cumul_')){
    const y=chartRange.slice(6);
    getVal=p=>getProductTotal(p,y);
  } else {
    getVal=p=>getProductTotal(p);
  }

  let prods=[...PRODUCTS].sort((a,b)=>getVal(b)-getVal(a));
  if(chartSearchQuery){
    prods=prods.filter(p=>p.name.includes(chartSearchQuery)||p.code.includes(chartSearchQuery));
  } else if(topN){
    prods=prods.slice(0,topN);
  }
  const maxVal=Math.max(...prods.map(p=>getVal(p)),1);
  document.getElementById('chart-container').innerHTML=prods.map((p,i)=>{
    const v=getVal(p),pct=v/maxVal;
    const bc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    return `<div class="chart-row">
      <div class="chart-rank">${i+1}žúĄ</div>
      <div class="chart-label" title="${p.name}">${p.name}</div>
      <div class="chart-bar-wrap">
        <div class="chart-bar ${bc}" style="width:calc(${pct.toFixed(4)} * (100% - 50px))"></div>
        <div class="chart-val">${v}</div>
      </div>
    </div>`;
  }).join('');
}

function renderMonthly(){
  // žóįŽŹĄ žĄ†ŪÉĚ ŽďúŽ°≠Žč§žöī žīąÍłįŪôĒ
  const yearSel = document.getElementById('monthly-bar-year');
  const activeYears = getYears().slice().reverse();
  const prevVal = yearSel.value;
  yearSel.innerHTML = activeYears.map(y=>`<option value="${y}">${y}ŽÖĄ</option>`).join('');
  if(prevVal && activeYears.includes(prevVal)) yearSel.value = prevVal;
  const selectedYear = yearSel.value || getLatestYear();
  const ly = getLatestYear();
  const latestM = getLatestMonth().split('-')[1];

  // žõĒŽ≥Ą ŽįĒ Í∑łŽěėŪĒĄ (žĄ†ŪÉĚŽźú žóįŽŹĄ Íłįž§Ä)
  const allMonths=['01','02','03','04','05','06','07','08','09','10','11','12'];
  const monthTotals=allMonths.map(m=>{
    const ym=selectedYear+'-'+m;
    return PRODUCTS.reduce((s,p)=>s+getProductMonthTotal(p,ym),0);
  });
  const maxMonthVal=Math.max(...monthTotals,1);
  const BAR_MAX_H=160;
  document.getElementById('monthly-bar-title').textContent=selectedYear+'ŽÖĄ žõĒŽ≥Ą ŪĆźŽß§ŽüČ';
  document.getElementById('mbc-cols').innerHTML=
    allMonths.map((m,i)=>{
      const v=monthTotals[i];
      const barH=v>0?Math.max(Math.round(v/maxMonthVal*BAR_MAX_H),4):0;
      const isCurrent=m===latestM && selectedYear===ly;
      const isEmpty=v===0;
      return `<div class="mbc-col">
        <div class="mbc-val">${v||''}</div>
        <div class="mbc-bar${isCurrent?' current':''}${isEmpty?' empty':''}" style="height:${barH}px"></div>
        <div class="mbc-label">${parseInt(m)}žõĒ</div>
      </div>`;
    }).join('');
}

function renderYearly(){
  const activeYears=getYears(),currentYear=getLatestYear();
  const sort=document.getElementById('yearly-sort').value;
  const rankMap={};
  [...PRODUCTS].sort((a,b)=>getProductTotal(b)-getProductTotal(a)).forEach((p,i)=>{rankMap[getKey(p)]=i+1;});
  let prods=[...PRODUCTS];
  if(sort==='total-desc') prods.sort((a,b)=>getProductTotal(b)-getProductTotal(a));
  else if(sort==='total-asc') prods.sort((a,b)=>getProductTotal(a)-getProductTotal(b));
  else prods.sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('year-cards').innerHTML=YEARS.map(y=>{
    const total=PRODUCTS.reduce((s,p)=>s+getProductTotal(p,y),0);
    const hasData=activeYears.includes(y),isCurrent=y===currentYear;
    return `<div class="year-card ${hasData?'has-data':''} ${isCurrent?'current':''}">
      <div class="y-year">${y}ŽÖĄ</div><div class="y-total">${total.toLocaleString()}</div>
      <div class="y-sub">${hasData?'ŽćįžĚīŪĄį žěąžĚĆ':'ŽćįžĚīŪĄį žóÜžĚĆ'}</div></div>`;
  }).join('');
  document.getElementById('yearly-thead').innerHTML=
    '<tr><th class="col-rank">žąúžúĄ</th><th class="col-name">ŪíąŽ™©Ž™Ö</th>'+
    YEARS.map(y=>`<th>${y}ŽÖĄ</th>`).join('')+'<th>ž†Ąž≤ī Ūē©Í≥Ą</th></tr>';
  const gt=PRODUCTS.reduce((s,p)=>s+getProductTotal(p),0);
  let rows=`<tr class="total-row"><td class="col-rank"></td><td class="col-name">Ūē©Í≥Ą</td>
    ${YEARS.map(y=>{const v=PRODUCTS.reduce((s,p)=>s+getProductTotal(p,y),0);return `<td class="num">${v.toLocaleString()}</td>`;}).join('')}
    <td class="num">${gt.toLocaleString()}</td></tr>`;
  prods.forEach(p=>{
    const total=getProductTotal(p),rank=rankMap[getKey(p)];
    const rc=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    rows+=`<tr><td class="col-rank"><span class="rank-num ${rc}">${rank}</span></td>
      <td class="col-name" title="${p.name}">${p.name}</td>
      ${YEARS.map(y=>{const v=getProductTotal(p,y);return `<td class="${v?'num':'zero'}">${v||'-'}</td>`;}).join('')}
      <td class="num">${total||'-'}</td></tr>`;
  });
  document.getElementById('yearly-tbody').innerHTML=rows;
  setTimeout(()=>syncScroll('yearly-table-wrap','yearly-scroll-top','yearly-scroll-inner'),100);
  document.getElementById('yearly-mobile').innerHTML=prods.map(p=>{
    const total=getProductTotal(p),rank=rankMap[getKey(p)];
    const bc=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    const bgColor=bc==='gold'?'#f5a623':bc==='silver'?'#9b9b9b':bc==='bronze'?'#c47c3a':'#eee';
    return `<div style="background:white;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="font-size:14px;font-weight:700;flex:1;margin-right:8px;">${p.name}</div>
        <span style="background:${bgColor};color:${bc?'white':'#888'};font-size:10px;font-weight:700;border-radius:10px;padding:2px 8px;">${rank}žúĄ</span>
        <div style="font-size:18px;font-weight:700;color:#4a90e2;margin-left:8px;">${total||'-'}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">
        ${activeYears.map(y=>{const v=getProductTotal(p,y);
          return `<div style="background:#f5f6fa;border-radius:6px;padding:6px;text-align:center;">
            <div style="font-size:10px;color:#888;">${y}ŽÖĄ</div>
            <div style="font-size:14px;font-weight:700;color:${v?'#1a1a2e':'#ddd'};">${v||'-'}</div></div>`;
        }).join('')}
      </div></div>`;
  }).join('');
}

let currentMonth='';
function initMonthBtns(){
  const months=getMonths().slice().reverse(); // žĶúžč† žõĒ Ž®ľž†Ä
  const latestYm=months[0]||'';
  // currentMonthÍįÄ žóÜÍĪįŽāė ž°īžě¨ŪēėžßÄ žēäŽäĒ žõĒžĚīŽ©ī žĶúžč† žõĒŽ°ú žĄ§ž†ē
  if(!currentMonth || !months.includes(currentMonth)) currentMonth=latestYm;
  const c=document.getElementById('month-btns');
  c.innerHTML='<button class="mbtn'+(currentMonth===''?' active':'')+'" onclick="filterMonth(\'\',this)">ž†Ąž≤ī</button>';
  months.forEach(ym=>{
    const [y,m]=ym.split('-');
    const isActive=currentMonth===ym;
    c.innerHTML+=`<button class="mbtn${isActive?' active':''}" onclick="filterMonth('${ym}',this)">${y.slice(2)}ŽÖĄ ${m}žõĒ</button>`;
  });
}
function filterMonth(ym,btn){
  currentMonth=ym;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDaily();
}
function renderDaily(){
  let allDates=Object.keys(dailyData).sort();
  if(currentMonth) allDates=allDates.filter(d=>d.startsWith(currentMonth));
  const groups={};
  allDates.forEach(d=>{const ym=d.slice(0,7);if(!groups[ym])groups[ym]=[];groups[ym].push(d);});
  const sortedYMs=Object.keys(groups).sort().reverse();
  document.getElementById('daily-thead').innerHTML=
    '<tr><th class="col-date">Žā†žßú</th><th class="col-subtotal">Ūē©Í≥Ą</th>'+
    PRODUCTS.map(p=>`<th title="${p.name}">${p.name.length>6?p.name.slice(0,6)+'‚Ä¶':p.name}</th>`).join('')+'</tr>';
  let rows='';
  if(!currentMonth){
    getYears().sort().reverse().forEach(y=>{
      const yT=PRODUCTS.reduce((s,p)=>s+getProductTotal(p,y),0);
      rows+=`<tr class="year-total-row"><td class="col-date">ūüŹÜ ${y}ŽÖĄ Ūē©Í≥Ą</td><td class="col-subtotal">${yT.toLocaleString()}</td>
        ${PRODUCTS.map(p=>{const v=getProductTotal(p,y);return `<td class="${v?'num':'zero'}">${v||'-'}</td>`;}).join('')}</tr>`;
    });
  }
  sortedYMs.forEach(ym=>{
    const [y,m]=ym.split('-'),mDates=groups[ym],mT=mDates.reduce((s,d)=>s+getDayTotal(d),0);
    rows+=`<tr class="month-total-row"><td class="col-date">ūüďÖ ${y.slice(2)}ŽÖĄ ${m}žõĒ Ūē©Í≥Ą</td><td class="col-subtotal">${mT.toLocaleString()}</td>
      ${PRODUCTS.map(p=>{const key=getKey(p),v=mDates.reduce((s,d)=>s+(dailyData[d][key]||0),0);return `<td class="${v?'num':'zero'}">${v||'-'}</td>`;}).join('')}</tr>`;
    [...mDates].sort().reverse().forEach(date=>{
      const dt=getDayTotal(date);
      rows+=`<tr><td class="col-date">${fmtDate(date)}</td><td class="col-subtotal ${dt?'num':'zero'}">${dt||'-'}</td>
        ${PRODUCTS.map(p=>{const v=dailyData[date][getKey(p)]||0;return `<td class="${v?'num':'zero'}">${v||'-'}</td>`;}).join('')}</tr>`;
    });
  });
  document.getElementById('daily-tbody').innerHTML=rows;
  setTimeout(()=>syncScroll('daily-table-wrap','daily-scroll-top','daily-scroll-inner'),100);
  let mobileHTML='';
  if(!currentMonth){
    getYears().sort().reverse().forEach(y=>{
      const yT=PRODUCTS.reduce((s,p)=>s+getProductTotal(p,y),0);
      if(yT>0) mobileHTML+=`<div style="background:#e8f5e9;border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;font-weight:700;color:#2e7d32;font-size:13px;"><span>ūüŹÜ ${y}ŽÖĄ Ūē©Í≥Ą</span><span>${yT.toLocaleString()}</span></div>`;
    });
  }
  sortedYMs.forEach(ym=>{
    const [y,m]=ym.split('-'),mDates=groups[ym],mT=mDates.reduce((s,d)=>s+getDayTotal(d),0);
    mobileHTML+=`<div style="background:#fff8e1;border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;font-weight:700;color:#e65100;font-size:13px;"><span>ūüďÖ ${y.slice(2)}ŽÖĄ ${m}žõĒ Ūē©Í≥Ą</span><span>${mT.toLocaleString()}</span></div>`;
    [...mDates].sort().reverse().forEach(date=>{
      const dt=getDayTotal(date);
      const items=Object.entries(dailyData[date]||{}).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])
        .map(([k,v])=>{const prod=KEY_MAP[k];const name=prod?prod.name:k;
          return `<div style="background:#f5f6fa;border-radius:6px;padding:4px 8px;font-size:12px;"><span style="color:#555;">${name}</span><span style="font-weight:700;margin-left:4px;">${v}</span></div>`;
        }).join('');
      mobileHTML+=`<div style="background:white;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${items?'8px':'0'};">
          <div style="font-size:15px;font-weight:700;">${fmtDate(date)}</div>
          <div style="font-size:18px;font-weight:700;color:#4a90e2;">${dt||'-'}</div>
        </div>
        ${items?`<div style="display:flex;flex-wrap:wrap;gap:6px;">${items}</div>`:'<div style="font-size:12px;color:#ccc;">ŪĆźŽß§ žóÜžĚĆ</div>'}
      </div>`;
    });
  });
  document.getElementById('daily-mobile').innerHTML=mobileHTML;
}

// žóÖŽ°úŽďú - ÍįôžĚÄ ŪĆĆžĚľ žě¨žóÖŽ°úŽďú Ž≤ĄÍ∑ł žąėž†ē (input value žīąÍłįŪôĒ)
function handleFile(file){
  // input žīąÍłįŪôĒŪēīžĄú ÍįôžĚÄ ŪĆĆžĚľ žě¨žĄ†ŪÉĚ ÍįÄŽä•ŪēėÍ≤Ć
  const input = document.getElementById('upload-input');
  input.value = '';

  if(!file||!file.name.endsWith('.xlsx')){showUploadMsg('‚ĚĆ xlsx ŪĆĆžĚľŽßĆ ÍįÄŽä•Ūē©ŽčąŽč§.');return;}
  const match=file.name.match(/^(\d{6})/);
  if(!match){showUploadMsg('‚ĚĆ ŪĆĆžĚľŽ™Ö žēě 6žěźŽ¶¨ÍįÄ Žā†žßúžó¨žēľ Ūē©ŽčąŽč§.');return;}
  const ds=match[1],dateKey=`20${ds.slice(0,2)}-${ds.slice(2,4)}-${ds.slice(4,6)}`;
  showUploadMsg('‚Ź≥ '+ds+' ž≤ėŽ¶¨ ž§Ď...');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets['ž£ľŽ¨łžĄúžąėžčĚ_žä§ŽßąŪäłžä§ŪÜ†žĖī'];
      if(!ws){showUploadMsg('‚ĚĆ žčúŪäłŽ•ľ žįĺžĚĄ žąė žóÜžäĶŽčąŽč§.');return;}
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const newData={};
      for(let i=16;i<rows.length;i++){
        const code=String(rows[i][0]).trim(),qty=Number(rows[i][4]);
        if(!code||!qty||isNaN(qty)) continue;
        if(KEY_MAP[code]) newData[code]=(newData[code]||0)+qty;
      }

      // ŪėĄžě¨ žÉĀŪÉú žä§ŪÉĚžóź ž†Äžě• (žĶúŽĆÄ 5Íįú)
      undoStack.push({
        dateKey,
        prevData: dailyData[dateKey] ? JSON.parse(JSON.stringify(dailyData[dateKey])) : null,
        label: ds
      });
      if(undoStack.length > 5) undoStack.shift();
      document.getElementById('undo-btn').classList.add('visible');

      dailyData[dateKey]=newData;
      const total=Object.values(newData).reduce((s,v)=>s+v,0);
      showUploadMsg('‚úÖ '+ds+' žôĄŽ£Ć! ('+total+'Íįú)');
      refreshAll();
    }catch(err){showUploadMsg('‚ĚĆ žė§Ž•ė: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

function undoUpload(){
  if(undoStack.length===0) return;
  const last=undoStack.pop();
  if(last.prevData===null){
    delete dailyData[last.dateKey];
  } else {
    dailyData[last.dateKey]=last.prevData;
  }
  showUploadMsg('‚Ü© '+last.label+' žóÖŽ°úŽďú ž∑®žÜĆŽź®');
  if(undoStack.length===0) document.getElementById('undo-btn').classList.remove('visible');
  refreshAll();
}

function showUploadMsg(msg){
  const el=document.getElementById('upload-inline-msg');
  el.textContent=msg;
  setTimeout(()=>{if(el.textContent===msg)el.textContent='';},5000);
}
function switchTab(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
}

renderDaily();renderMonthly();renderYearly();renderChart();
